spring.datasource.url=jdbc:sqlite:database.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- SENDGRID SMTP ---
# NUNCA coloque a chave real aqui. Ela vem de uma variavel de ambiente.
# Defina SENDGRID_API_KEY no seu sistema (ou em Run Configurations da IDE) antes de rodar.
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587

spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- JWT ---
# Segredo usado para assinar os tokens. Troque por um valor forte e mantenha em variavel de ambiente em producao.
jwt.secret=${JWT_SECRET:mude-este-segredo-para-algo-longo-e-aleatorio-antes-de-ir-para-producao-0123456789}
# Tempo de vida do token em milissegundos (24h)
jwt.expiration-ms=86400000

# --- CORS ---
# Origem(ns) permitida(s) para chamar a API. Ajuste para onde o Live Server estiver rodando.
app.cors.allowed-origins=http://127.0.0.1:5500,http://localhost:5500
