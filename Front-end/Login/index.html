<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="style.css">

    <title>Login</title>
</head>
<body>
    <main class="container">
        <form id="login-form">
            <h1>Federados</h1>
            <div class="input-box">
                <input placeholder="Email" type="email" required>
                <div class="user-icon">
                    <i class="bx bxs-user"></i>
                </div>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password" required>
                <div class="show-password">
                    <i class="bx bxs-lock-alt"></i>
                </div>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="login">Login</button>
            
            <div class="register-link">
                <p>Não tem uma conta? <a href="../Cadastro/index.html">Cadastre-se</a></p>
            </div>
        </form>
    </main>

    <script>
        // Pega o formulário
        const formLogin = document.querySelector('form');

        formLogin.addEventListener('submit', async (event) => {
            event.preventDefault(); 
            
            // Captura os valores digitados
            const email = document.querySelector('input[type="email"]').value;
            const senha = document.querySelector('input[type="password"]').value;

            try {
                // Envia para a porta 8080 do Spring Boot
                const resposta = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    // Os nomes aqui devem bater com os atributos do seu LoginDTO em Java
                    body: JSON.stringify({ email: email, senha: senha })
                });

                if (resposta.ok) {
                    // --- PASSO 1 ADICIONADO AQUI ---
                    // Salva o email no armazenamento do navegador para a "sessão"
                    localStorage.setItem('usuarioLogado', email);

                    alert("Login aprovado!");
                    // Vai para a tela do Feed
                    window.location.href = '../Feed/index.html'; 
                } else {
                    alert("Email ou senha incorretos.");
                }
                
            } catch (erro) {
                console.error("Erro:", erro);
                alert("Erro de conexão. O servidor Java (BackendApplication) está rodando?");
            }
        });
    </script>
</body>
</html>
