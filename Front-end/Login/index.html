<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">

    <title>Login</title>
</head>
<body>
    <main class="container">
        <form id="login-form">
            <h1>Federados</h1>
            <div class="input-box">
                <input id="login-email" placeholder="Email" type="email" required>
                <div class="user-icon">
                    <i class="bx bxs-user"></i>
                </div>
            </div>
            <div class="input-box">
                <input id="login-senha" placeholder="Senha" type="password" required>
                <div class="show-password">
                    <i class="bx bxs-lock-alt"></i>
                </div>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="../Recuperacao/recuperacao.html" style="display: inline-block; cursor: pointer;">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="login">Login</button>
            
            <div class="register-link">
                <p>Não tem uma conta? <a href="../Cadastro/index.html">Cadastre-se</a></p>
            </div>
        </form>
    </main>

    <script src="../common/auth.js"></script>
    <script src="script-login.js"></script>
</body>
</html>
