<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federados - index</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <form id="register-form">
            <h1 class="federados-title">Federados</h1>
            <h2 class="section-title">Dados cadastrais</h2>
            <p class="obligatory-info">Os dados marcados com * devem ser preenchidos obrigatoriamente</p>

            <div class="input-group">
                <label>Email institucional*</label>
                <input type="email" placeholder="ex: nome@ufrpe.br" required>
            </div>

            <div class="input-group">
                <label>Nome completo *</label>
                <input type="text" required>
            </div>

            <div class="input-row">
                <div class="input-group flex-2">
                    <label>Curso*</label>
                    <input type="text" placeholder="ex: Engenharia da computação" required>
                </div>
                <div class="input-group flex-1">
                    <label>Período *</label>
                    <input type="number" value="1" min="1" max="12" required>
                </div>
            </div>

            <div class="input-group">
                <label>Descrição pessoal</label>
                <input type="text">
            </div>

            <div class="input-group">
                <label>Senha*</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="ex: Federados1234" required>
                    <span class="toggle-password" onclick="togglePass('password')">👁️</span>
                </div>
            </div>

            <div class="validation-list">
                <p id="rule-length" class="invalid">Sua senha precisa ter pelo menos 8 dígitos.</p>
                <p id="rule-upper" class="invalid">Sua senha precisa ter pelo menos uma letra maiúscula.</p>
                <p id="rule-number" class="invalid">Sua senha precisa ter pelo menos um número.</p>
            </div>

            <div class="input-group">
                <label>Repetir senha *</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" required>
                    <span class="toggle-password" onclick="togglePass('confirm_password')">👁️</span>
                </div>
            </div>

            <div class="validation-list">
                <p id="rule-match" class="invalid">As senhas precisam ser iguais.</p>
            </div>

            <button type="submit" class="btn-next">Cadastrar</button>
        </form>
    </div>

    <div class="dots-pattern"></div>

    <script src="script-cadastro.js"></script>
</body>
</html>
