<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federados - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <form id="form-cadastro">
            <h1 class="federados-title">Federados</h1>
            <h2 class="section-title">Dados cadastrais</h2>
            <p class="obligatory-info">Os dados marcados com * devem ser preenchidos obrigatoriamente</p>

            <div class="input-group">
                <label>Tipo de Vínculo*</label>
                <select id="tipo-usuario" required class="custom-select">
                    <option value="discente" selected>Discente (Estudante)</option>
                    <option value="docente">Docente (Professor)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Email institucional*</label>
                <input type="email" id="email" placeholder="ex: nome@ufrpe.br" required>
            </div>

            <div class="input-group">
                <label>Nome completo *</label>
                <input type="text" id="nome" required>
            </div>

            <div class="input-row" id="row-discente">
                <div class="input-group flex-2">
                    <label>Curso*</label>
                    <input type="text" id="curso" placeholder="ex: Engenharia da Computação">
                </div>
                <div class="input-group flex-1">
                    <label>Período *</label>
                    <input type="number" id="periodo" value="1" min="1" max="12">
                </div>
            </div>

            <div class="input-row" id="row-docente" style="display: none;">
                <div class="input-group flex-2">
                    <label>Departamento / Área*</label>
                    <input type="text" id="departamento" placeholder="ex: Unidade Acadêmica de Belo Jardim">
                </div>
                <div class="input-group flex-1">
                    <label>SIAPE *</label>
                    <input type="text" id="siape" placeholder="ex: 1234567">
                </div>
            </div>

            <div class="input-group">
                <label>Descrição pessoal</label>
                <input type="text" id="descricao">
            </div>

            <div class="input-group">
                <label>Senha*</label>
                <div class="password-wrapper">
                    <input type="password" id="senha" placeholder="ex: Federados1234" required>
                    <span class="toggle-password" onclick="togglePass('senha')">👁️</span>
                </div>
            </div>

            <div class="validation-list">
                <p id="rule-length" class="invalid">Sua senha precisa ter pelo menos 8 dígitos.</p>
                <p id="rule-upper" class="invalid">Sua senha precisa ter pelo menos uma letra maiúscula.</p>
                <p id="rule-number" class="invalid">Sua senha precisa ter pelo menos um número.</p>
            </div>

            <div class="input-group">
                <label>Repetir senha *</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" required>
                    <span class="toggle-password" onclick="togglePass('confirm_password')">👁️</span>
                </div>
            </div>

            <div class="validation-list">
                <p id="rule-match" class="invalid">As senhas precisam ser iguais.</p>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-outline" id="btn-voltar">Voltar</button>
                <button type="submit" class="btn-pill">Cadastrar</button>
            </div>
        </form>
    </div>

    <div class="dots-pattern"></div>

    <script src="script-cadastro.js"></script>
</body>
</html>
